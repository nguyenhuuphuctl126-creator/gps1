<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>WebAR Location-Based - AR.js</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    
    <a-scene 
      vr-mode-ui="enabled: false" 
      embedded 
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
      renderer="antialias: true; alpha: true">
      
      <a-assets>
        <a-asset-item id="bird-obj" src="./assets/10012_crab_v2_iterations-1.obj"></a-asset-item>
        <a-asset-item id="bird-mtl" src="./assets/10012_crab_v2_iterations-1.mtl"></a-asset-item>
      </a-assets>

      <a-entity 
        gps-entity-place="latitude: 10.4578; longitude: 105.6321;" 
        obj-model="obj: #bird-obj; mtl: #bird-mtl" 
        scale="1 1 1" 
        look-at="[gps-camera]">
      </a-entity>
      
      <a-camera gps-camera rotation-reader></a-camera>
      
    </a-scene>
  </body>
</html>
